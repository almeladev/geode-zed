name: Bug report
description: Report a color, contrast, or token that looks wrong
labels: ["bug"]
body:
  - type: dropdown
    id: variant
    attributes:
      label: Variant
      options:
        - Geode Dark
        - Geode Light
        - Both
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language / file type
      placeholder: e.g. TypeScript, Rust, Markdown
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What looks wrong?
      description: Which token or UI element, and what you'd expect instead.
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: A screenshot makes color issues much easier to fix.
  - type: input
    id: zed-version
    attributes:
      label: Zed version
      placeholder: e.g. 0.x.x
