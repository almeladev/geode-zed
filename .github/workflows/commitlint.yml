name: Lint commits

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check Conventional Commit messages
        run: |
          python3 .github/scripts/check_conventional_commits.py \
            "origin/${{ github.base_ref }}..${{ github.event.pull_request.head.sha }}"
