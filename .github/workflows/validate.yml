name: Validate theme

on:
  push:
    paths:
      - "themes/**"
      - "assets/**"
      - "extension.toml"
      - "CHANGELOG.md"
      - ".github/scripts/**"
      - ".github/schemas/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "themes/**"
      - "assets/**"
      - "extension.toml"
      - "CHANGELOG.md"
      - ".github/scripts/**"
      - ".github/schemas/**"
      - ".github/workflows/validate.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate themes/geode.json
        run: python3 .github/scripts/validate_theme.py themes/geode.json

      - name: Check the SVG assets stay in sync with the theme
        run: python3 .github/scripts/check_asset_colors.py

      - name: Check version is documented in the changelog
        run: python3 .github/scripts/check_version_sync.py

      - name: Validate against Zed's theme schema (vendored, offline)
        run: |
          python3 -m pip install --quiet jsonschema
          python3 .github/scripts/check_schema.py themes/geode.json
