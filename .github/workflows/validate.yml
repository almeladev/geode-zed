name: Validate theme

on:
  push:
    paths:
      - "themes/**"
      - "extension.toml"
      - "CHANGELOG.md"
      - ".github/scripts/**"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "themes/**"
      - "extension.toml"
      - "CHANGELOG.md"
      - ".github/scripts/**"
      - ".github/workflows/validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate themes/geode.json
        run: python3 .github/scripts/validate_theme.py themes/geode.json

      - name: Check version is documented in the changelog
        run: python3 .github/scripts/check_version_sync.py
